server {
    listen 80;
    server_name _;

    # Proxy /api/ and /airdrop/api/ to Render API service
    location /airdrop/api/ {
        rewrite ^/airdrop(/.*)$ $1 break;
        proxy_pass         https://nexusprotocol-api.onrender.com;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header   Host              nexusprotocol-api.onrender.com;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/ {
        proxy_pass         https://nexusprotocol-api.onrender.com;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header   Host              nexusprotocol-api.onrender.com;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /airdrop/ {
        alias /usr/share/nginx/html/airdrop/;
        try_files $uri $uri/ /airdrop/index.html;
        expires 1h;
    }

    location = / { return 301 /airdrop/; }
    location /health { return 200 "ok\n"; add_header Content-Type text/plain; }

    gzip on;
    gzip_types text/plain application/javascript text/css application/json;
}
